<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — 4Hard Zap-Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">⚡</div>

    <h1 style="text-align:center;font-size:1.3rem;font-weight:800;margin-bottom:6px;letter-spacing:-0.03em;">
      4Hard Zap-Marketing
    </h1>
    <p style="text-align:center;color:var(--text-muted);font-size:0.82rem;margin-bottom:28px;">
      Painel de Licenças — Acesso Restrito
    </p>

    <div id="error-msg" style="display:none;background:rgba(255,82,82,0.08);border:1px solid rgba(255,82,82,0.2);border-radius:8px;padding:10px 14px;color:#ff5252;font-size:0.82rem;margin-bottom:16px;"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="btn-login" style="width:100%;height:44px;margin-top:8px;font-size:0.9rem;">
        Entrar no Painel
      </button>
    </form>

  </div>
</div>

<script>
  // Redirecionar se ja estiver logado
  if (localStorage.getItem('admin_token')) {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('btn-login');
    const error = document.getElementById('error-msg');
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Entrando...';
    error.style.display = 'none';

    try {
      const res  = await fetch('/api/admin/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('admin_token', data.token);
        window.location.href = 'dashboard.html';
      } else {
        error.textContent    = 'Email ou senha incorretos.';
        error.style.display  = 'block';
      }
    } catch {
      error.textContent   = 'Erro de conexão. Tente novamente.';
      error.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Entrar no Painel';
    }
  });
</script>

</body>
</html>
