<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Licenças — 4Hard Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">⚡</div>
      <div class="brand-name">4Hard Zap-Marketing</div>
      <div class="brand-sub">Painel Admin</div>
    </div>
    <nav>
      <a href="dashboard.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="licenses.html" class="nav-item active">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Licenças
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" onclick="logout()" style="color:var(--danger)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="page-title">Gerenciar Licenças</span>
      <button class="btn btn-primary btn-sm" onclick="openNewModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova Licença
      </button>
    </div>

    <div class="content">

      <!-- Filtros -->
      <div class="filters">
        <input type="text" class="search-input" id="search" placeholder="Buscar por email, nome ou chave..." oninput="debounceSearch()">
        <select class="filter-select" id="filter-status" onchange="loadLicenses()">
          <option value="">Todos os status</option>
          <option value="ACTIVE">Ativas</option>
          <option value="PENDING">Aguardando</option>
          <option value="EXPIRED">Expiradas</option>
          <option value="REVOKED">Revogadas</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="loadLicenses()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Atualizar
        </button>
      </div>

      <!-- Tabela -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Chave</th>
                <th>Status</th>
                <th>Hardware</th>
                <th>Ativação</th>
                <th>Expira em</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="licenses-tbody">
              <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination" style="display:none">
          <span id="pagination-info"></span>
          <div class="pagination-btns">
            <button class="btn btn-outline btn-sm" id="btn-prev" onclick="changePage(-1)">← Anterior</button>
            <button class="btn btn-outline btn-sm" id="btn-next" onclick="changePage(1)">Próxima →</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal: Nova Licença Manual -->
<div class="modal-overlay" id="new-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>Nova Licença Manual</h3>
      <button class="btn-close" onclick="closeNewModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-muted);font-size:0.82rem;margin-bottom:20px">
        Cria uma licença fora do Hotmart e envia por email automaticamente.
      </p>
      <div class="form-group">
        <label for="new-name">Nome do Cliente</label>
        <input type="text" id="new-name" class="form-input" placeholder="João Silva">
      </div>
      <div class="form-group">
        <label for="new-email">Email do Cliente</label>
        <input type="email" id="new-email" class="form-input" placeholder="cliente@email.com">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeNewModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-create" onclick="createManualLicense()">
        Criar e Enviar Email
      </button>
    </div>
  </div>
</div>

<!-- Modal: Detalhes da Licença -->
<div class="modal-overlay" id="detail-modal" style="display:none">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3>Detalhes da Licença</h3>
      <button class="btn-close" onclick="closeDetailModal()">&times;</button>
    </div>
    <div class="modal-body" id="detail-body">
      Carregando...
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeDetailModal()">Fechar</button>
      <button class="btn btn-danger" id="btn-revoke-detail" onclick="revokeFromDetail()">
        Revogar Licença
      </button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/licenses.js"></script>
</body>
</html>
